<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Jäger Party Arcade</title>
    <style>
        :root { --pulse-duration: 1s; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #1b321a; background-image: radial-gradient(circle at center, #2a4d29 0%, #101e10 80%);
            background-size: 200% 200%; animation: wanderGlow 15s ease-in-out infinite alternate;
            color: #f28500; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; overflow: hidden; 
        }
        @keyframes wanderGlow { 0% { background-position: 0% 0%; } 50% { background-position: 100% 100%; } 100% { background-position: 0% 100%; } }
        
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .screen.active { display: flex; }
        .content-box { z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        
        .deer-particle { position: absolute; bottom: -100px; color: transparent; text-shadow: 0 0 5px rgba(242, 133, 0, 0.4), 0 0 10px rgba(255, 159, 28, 0.2); filter: blur(1px); z-index: 1; }
        @keyframes deerFloatUp { 0% { transform: translateY(0) rotate(-10deg) scale(0.8); opacity: 0; } 10% { opacity: 0.6; } 50% { transform: translateY(-50vh) rotate(10deg) scale(1.2); opacity: 0.8; } 90% { opacity: 0.6; } 100% { transform: translateY(-120vh) rotate(-5deg) scale(1); opacity: 0; } }

        h1 { font-size: 4.5rem; margin-bottom: 30px; text-align: center; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; text-shadow: 2px 4px 6px rgba(0,0,0,0.8); color: #f28500; z-index: 10; line-height: 1.1; }
        @media (max-width: 400px) { h1 { font-size: 3rem; } }
        .subtitle { font-size: 2.5rem; margin-bottom: 30px; text-align: center; color: #ff9f1c; text-shadow: 1px 2px 4px rgba(0,0,0,0.8); z-index: 10; }
        .timer-box { font-size: 2rem; font-weight: bold; margin-bottom: 20px; color: #1b321a; background: #f28500; padding: 5px 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 2px solid #ff9f1c; z-index: 10; pointer-events: none; }
        
        button { padding: 15px 30px; font-size: 1.5rem; background-color: #f28500; color: #1b321a; border: 2px solid #ff9f1c; border-radius: 8px; cursor: pointer; box-shadow: 0 6px 12px rgba(0,0,0,0.6); transition: all 0.1s; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; z-index: 20; margin-bottom: 15px; width: auto; white-space: nowrap; }
        button:active { transform: scale(0.95); background-color: #d17300; }
        @media (max-width: 350px) { button { font-size: 1.2rem; padding: 15px 20px;} }

        .button-group { display: flex; flex-direction: column; align-items: center; width: 100%; z-index: 10; }
        .secondary-btn { padding: 10px 40px; font-size: 1.1rem; background-color: transparent; color: #f28500; border: 2px solid #f28500; box-shadow: none; margin-top: 10px; }
        .secondary-btn:active { background-color: rgba(242, 133, 0, 0.1); transform: scale(0.95); }
        
        #mute-btn { position: absolute; top: 20px; right: 20px; font-size: 2rem; background: none; border: none; box-shadow: none; padding: 5px; margin: 0; z-index: 50; color: #f28500; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); width: auto; cursor: pointer; }
        .back-btn { position: absolute; top: 20px; left: 20px; font-size: 2rem; background: none; border: none; box-shadow: none; padding: 5px; margin: 0; z-index: 50; color: #f28500; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); cursor: pointer; width: auto; }
        .settings-btn { position: absolute; top: 20px; left: 80px; font-size: 2rem; background: none; border: none; box-shadow: none; padding: 5px; margin: 0; z-index: 50; color: #f28500; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); cursor: pointer; width: auto; }

        .grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 12px; width: 90vw; max-width: 600px; height: 55vh; max-height: 650px; position: relative; z-index: 10; }
        .card { background-color: transparent; width: 100%; height: 100%; perspective: 1000px; cursor: pointer; transition: opacity 0.4s ease; z-index: 1; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.5s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .card.matched { opacity: 0; pointer-events: none; }
        @keyframes shakeError { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px) rotate(-3deg); } 40%, 80% { transform: translateX(8px) rotate(3deg); } }
        .card.shake { animation: shakeError 0.4s ease-in-out; }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 8px; box-shadow: 0 6px 12px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .card-front { background-color: #1b321a; border: 3px solid #f28500; font-size: 3rem; }
        .card-back { background-color: #1b321a; border: 3px solid #f28500; transform: rotateY(180deg); }
        .card-image { width: 100%; height: 100%; object-fit: cover; display: block; transform: scale(1.43); }

        .game-canvas { border: 4px solid #f28500; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); pointer-events: none; width: 100vw; max-width: 600px; height: 75vh; max-height: 800px; }
        #bombCanvas { background-color: #1a331f; }
        #towerCanvas { background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); }
        #spinCanvas { background-color: #3e271c; border-radius: 50%; width: 90vw; max-width: 500px; height: 90vw; max-height: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); pointer-events: auto; }

        .spin-pointer { position: absolute; top: 8%; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 35px solid #dcdcdc; z-index: 25; filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.9)); }

        .hud-container { display: flex; justify-content: space-between; width: 90vw; max-width: 600px; margin-bottom: 10px; z-index: 10; pointer-events: none; }
        .lives-box { font-size: 1.5rem; color: #ff4757; text-shadow: 1px 1px 2px black; pointer-events: none;}
        .level-box { font-size: 1.5rem; color: #ffd700; text-shadow: 1px 1px 2px black; font-weight: bold; pointer-events: none;}
        .win-text { color: #f28500; } .lose-text { color: #ff4757; }

        #tension-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; display: none; }
        .tension-active { display: block !important; animation: pulseRed var(--pulse-duration) ease-in-out infinite alternate; }
        @keyframes pulseRed { 0% { box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.1); background-color: rgba(255, 0, 0, 0); } 100% { box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.7); background-color: rgba(255, 0, 0, 0.15); } }

        #confetti-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 50; display: none; }
        .confetti { position: absolute; top: -50px; width: 12px; height: 12px; opacity: 0.9; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
        #clink-container { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 40; opacity: 0; font-size: 8rem; display: none; gap: 10px; pointer-events: none; }
        .left-glass, .right-glass { display: inline-block; }
        @keyframes clinkLeft { 0% { transform: translateX(-150px) rotate(-45deg) scale(0.5); opacity: 0; } 50% { transform: translateX(20px) rotate(15deg) scale(1.3); opacity: 1; } 70% { transform: translateX(-10px) rotate(-5deg) scale(1.1); opacity: 1; } 100% { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; } }
        @keyframes clinkRight { 0% { transform: translateX(150px) rotate(45deg) scale(0.5); opacity: 0; } 50% { transform: translateX(-20px) rotate(-15deg) scale(1.3); opacity: 1; } 70% { transform: translateX(10px) rotate(5deg) scale(1.1); opacity: 1; } 100% { transform: translateX(0) rotate(0deg) scale(1); opacity: 1; } }

        #settings-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(27, 50, 26, 0.95); border: 2px solid #f28500; border-radius: 12px; padding: 20px; width: 90vw; max-width: 400px; z-index: 100; flex-direction: column; align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
        #settings-modal h2 { color: #f28500; margin-bottom: 15px; }
        #item-list { width: 100%; max-height: 200px; overflow-y: auto; margin-bottom: 15px; }
        .item-row { display: flex; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 8px; margin-bottom: 5px; border-radius: 4px; color: white; align-items: center; }
        .del-btn { background: #ff4757; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 1rem; width: auto; margin: 0;}
        .input-row { display: flex; width: 100%; gap: 5px; margin-bottom: 15px; }
        #new-item-input { flex-grow: 1; padding: 10px; font-size: 1.2rem; border-radius: 4px; border: 1px solid #f28500; background: #222; color: white; }
        #add-btn { width: auto; padding: 10px 15px; margin: 0; font-size: 1.2rem; }
        #close-settings-btn { width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="tension-overlay"></div>
    <button id="mute-btn" onclick="toggleMute()">🔊</button>

    <div id="start-screen" class="screen active">
        <div class="content-box">
            <h1>Jäger Party Games</h1>
            <button onclick="showModeSelection()">Játékmód kiválasztása</button>
        </div>
    </div>

    <div id="mode-selection-screen" class="screen">
        <div class="content-box">
            <h2 class="subtitle">Válassz játékot!</h2>
            <div class="button-group">
                <button onclick="startMemoryGame()">Memóriajáték</button>
                <button onclick="startBombDropGame()">Jägerbomb</button> 
                <button onclick="startTowerGame()">Stack 'Em High</button> 
                <button onclick="startSpinGame()">Jäger Spin</button> 
                <button class="secondary-btn" onclick="backToMainMenu()">Vissza</button>
            </div>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <button class="back-btn" onclick="backToMenuFromGame(event)">⬅️</button>
        <p class="timer-box">Idő: <span id="memory-time-left">60</span>s</p>
        <div class="grid" id="grid"></div>
    </div>

    <div id="bomb-game-screen" class="screen" style="cursor: pointer;">
        <button class="back-btn" onclick="backToMenuFromGame(event)">⬅️</button>
        <div class="hud-container">
            <div class="level-box">Szint: <span id="bomb-level">1</span>/6</div> 
            <div class="lives-box" id="bomb-lives">❤️❤️❤️</div>
        </div>
        <canvas id="bombCanvas" class="game-canvas" width="600" height="800"></canvas>
        <p class="timer-box" style="margin-top: 15px; pointer-events: none;">Idő: <span id="bomb-time-left">60</span>s</p>
    </div>

    <div id="tower-game-screen" class="screen" style="cursor: pointer;">
        <button class="back-btn" onclick="backToMenuFromGame(event)">⬅️</button>
        <div class="hud-container">
            <div class="level-box">Emelet: <span id="tower-level">1</span>/18</div> 
        </div>
        <canvas id="towerCanvas" class="game-canvas" width="600" height="800"></canvas>
        <p class="timer-box" style="margin-top: 15px; pointer-events: none;">Idő: <span id="tower-time-left">60</span>s</p>
    </div>

    <div id="spin-game-screen" class="screen">
        <button class="back-btn" onclick="backToMenuFromGame(event)">⬅️</button>
        <button class="settings-btn" onclick="openSpinSettings(event)">⚙️</button>
        
        <h2 class="subtitle" style="margin-top: 60px;">Pörgesd meg a kereket!</h2>
        
        <div style="position: relative; width: 100%; display: flex; justify-content: center; align-items: center; flex-grow: 1;">
            <div class="spin-pointer"></div>
            <canvas id="spinCanvas" width="500" height="500"></canvas>
        </div>
        <button id="spin-btn" style="margin-bottom: 50px;">Pörgetés!</button>
    </div>

    <div id="settings-modal">
        <h2>Italok Beállítása</h2>
        <div id="item-list"></div>
        <div class="input-row">
            <input type="text" id="new-item-input" placeholder="Új ital neve..." maxlength="15">
            <button id="add-btn" onclick="addSpinItem()">+</button>
        </div>
        <p style="color: #aaa; font-size: 0.9rem; margin-bottom: 10px; text-align: center;">(A gép automatikusan elrejt köztük 'Koponya' mezőket!)</p>
        <button id="close-settings-btn" onclick="closeSpinSettings()">Kész</button>
    </div>

    <div id="end-screen" class="screen">
        <div id="clink-container"><div id="glass-1" class="left-glass">🥃</div><div id="glass-2" class="right-glass">🥃</div></div>
        <div id="confetti-container"></div>
        <h1 id="end-message" style="z-index: 60;"></h1>
        <div class="button-group" style="z-index: 60;">
            <button id="restart-game-btn">Újra</button>
            <button class="secondary-btn" onclick="backToMainMenu()">Főmenü</button>
        </div>
    </div>

    <script>
        const bgMusic = new Audio('background.mp3'); bgMusic.loop = true; bgMusic.volume = 0.3; 
        const tickSound = new Audio('ticking.mp3'); tickSound.loop = true; tickSound.volume = 1.0;
        const matchSound = new Audio('correct.mp3'); matchSound.volume = 0.7;
        const errorSound = new Audio('error.mp3'); errorSound.volume = 0.6;
        const winSound = new Audio('win.mp3'); winSound.volume = 0.9;
        const loseSound = new Audio('lose.mp3'); loseSound.volume = 0.9;

        let isMuted = false;
        function toggleMute() {
            isMuted = !isMuted; document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🔊';
            bgMusic.muted = tickSound.muted = matchSound.muted = errorSound.muted = winSound.muted = loseSound.muted = isMuted;
        }
        function playSound(a) { if (isMuted) return; a.currentTime = 0; a.play().catch(e=>console.log(e)); }

        let audioCtx;
        function playSynthesizedTick() {
            if (isMuted) return;
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'square'; 
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime); 
            oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.05); 
            gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime); 
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
            oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.05);
        }

        let deerInterval;
        function createDeerParticles() {
            removeDeerParticles(); for(let i=0; i<6; i++) spawnSingleDeer();
            deerInterval = setInterval(spawnSingleDeer, 1500);
        }
        function spawnSingleDeer() {
            if(document.getElementById('start-screen').classList.contains('active') || document.getElementById('mode-selection-screen').classList.contains('active')) {
                const deer = document.createElement('div'); deer.className = 'deer-particle'; deer.innerText = '🦌';
                deer.style.left = `${Math.random() * 90}vw`; deer.style.fontSize = `${Math.random() * 2 + 1.5}rem`;
                let duration = Math.random() * 8 + 10; deer.style.animation = `deerFloatUp ${duration}s ease-in forwards`;
                document.body.appendChild(deer); setTimeout(() => { deer.remove(); }, duration * 1000);
            }
        }
        function removeDeerParticles() { clearInterval(deerInterval); document.querySelectorAll('.deer-particle').forEach(e => e.remove()); }
        createDeerParticles();

        let currentGameMode = ''; let timerInterval; let timeLeft = 60; let isGameActive = false;
        let activeGameLoopId; 

        function hideAllScreens() { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); }
        function showModeSelection() { hideAllScreens(); document.getElementById('mode-selection-screen').classList.add('active'); }
        function backToMainMenu() { hideAllScreens(); createDeerParticles(); document.getElementById('start-screen').classList.add('active'); }

        function backToMenuFromGame(event) {
            if(event) event.stopPropagation(); 
            isGameActive = false; clearInterval(timerInterval); cancelAnimationFrame(activeGameLoopId);
            bgMusic.pause(); tickSound.pause(); document.getElementById('tension-overlay').classList.remove('tension-active');
            document.getElementById('confetti-container').style.display = 'none'; document.getElementById('clink-container').style.display = 'none';
            hideAllScreens(); createDeerParticles(); document.getElementById('mode-selection-screen').classList.add('active');
        }

        function resetTensionAndMusic() {
            tickSound.pause(); tickSound.currentTime = 0; tickSound.playbackRate = 1.0;
            document.getElementById('tension-overlay').classList.remove('tension-active');
            document.documentElement.style.setProperty('--pulse-duration', '1s');
            if (!isMuted) { bgMusic.currentTime = 0; bgMusic.volume = 0.3; bgMusic.play().catch(e=>console.log(e)); }
        }

        function startCommonTimer(displayId) {
            timerInterval = setInterval(() => {
                if (!isGameActive) { clearInterval(timerInterval); return; }
                timeLeft--; document.getElementById(displayId).innerText = timeLeft;
                if (timeLeft === 10) { if (!isMuted) tickSound.play().catch(e=>console.log(e)); document.getElementById('tension-overlay').classList.add('tension-active'); bgMusic.volume = 0.1; }
                if (timeLeft <= 10 && timeLeft > 0) {
                    let rate = 0.7 + ((10 - timeLeft) * 0.1); tickSound.playbackRate = rate;
                    let pulseDuration = 1.2 - ((10 - timeLeft) * 0.08); document.documentElement.style.setProperty('--pulse-duration', `${pulseDuration}s`);
                }
                if (timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function endGame(isWin, customMessage = null) {
            isGameActive = false; clearInterval(timerInterval); cancelAnimationFrame(activeGameLoopId);
            hideAllScreens(); document.getElementById('end-screen').classList.add('active');
            bgMusic.pause(); tickSound.pause(); document.getElementById('tension-overlay').classList.remove('tension-active');
            const endMessage = document.getElementById('end-message');
            
            if (isWin) { 
                playSound(winSound); 
                endMessage.innerHTML = customMessage ? customMessage : 'Egészségedre!<br>Nyertél!'; 
                endMessage.className = 'win-text'; 
                startConfetti(); triggerClinkAnimation(); 
            } else { 
                playSound(loseSound); 
                endMessage.innerHTML = customMessage ? customMessage : 'Sajnos vesztettél! 🚫'; 
                endMessage.className = 'lose-text'; 
            }
            
            document.getElementById('restart-game-btn').onclick = () => {
                if(currentGameMode === 'memory') startMemoryGame(); 
                else if(currentGameMode === 'bomb') startBombDropGame();
                else if(currentGameMode === 'tower') startTowerGame();
                else if(currentGameMode === 'spin') startSpinGame();
            };
        }

        function startConfetti() {
            const container = document.getElementById('confetti-container'); container.style.display = 'block'; container.innerHTML = ''; const colors = ['#f28500', '#ff9f1c', '#1b321a', '#ffffff'];
            for (let i = 0; i < 70; i++) {
                const confetti = document.createElement('div'); confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw'; confetti.style.animationDuration = (Math.random() * 3 + 2) + 's'; confetti.style.animationDelay = Math.random() * 2 + 's';
                if (i % 10 === 0) { confetti.innerText = Math.random() > 0.5 ? '🥃' : '🎉'; confetti.style.fontSize = '2rem'; confetti.style.background = 'transparent'; } 
                else { confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)]; } container.appendChild(confetti);
            }
        }
        function triggerClinkAnimation() {
            const container = document.getElementById('clink-container'); const glass1 = document.getElementById('glass-1'); const glass2 = document.getElementById('glass-2');
            container.style.opacity = 1; container.style.display = 'flex'; glass1.style.animation = 'clinkLeft 1.2s ease-out forwards'; glass2.style.animation = 'clinkRight 1.2s ease-out forwards';
        }

        const cardImages = ['card1.png', 'card2.png', 'card3.png', 'card4.png', 'card5.png', 'card6.png', 'card7.png', 'card8.png'];
        let flippedCards = []; let matchedPairs = 0; let isLocked = false; let cardElements = [];
        function startMemoryGame() {
            currentGameMode = 'memory'; isGameActive = true; hideAllScreens(); removeDeerParticles(); document.getElementById('game-screen').classList.add('active');
            document.getElementById('confetti-container').style.display = 'none'; document.getElementById('confetti-container').innerHTML = ''; document.getElementById('clink-container').style.display = 'none'; document.getElementById('glass-1').style.animation = 'none'; document.getElementById('glass-2').style.animation = 'none';
            resetTensionAndMusic(); timeLeft = 60; matchedPairs = 0; flippedCards = []; document.getElementById('memory-time-left').innerText = timeLeft;
            setupBoard(); startCommonTimer('memory-time-left');
        }
        function setupBoard() {
            const grid = document.getElementById('grid'); grid.innerHTML = ''; cardElements = []; let orderedCards = [...cardImages, ...cardImages]; isLocked = true;
            orderedCards.forEach((imgSrc) => {
                const card = document.createElement('div'); card.classList.add('card', 'flipped'); card.dataset.value = imgSrc; 
                card.innerHTML = `<div class="card-inner"><div class="card-front">🦌</div><div class="card-back"><img src="${imgSrc}" class="card-image"></div></div>`;
                card.addEventListener('click', () => flipCard(card)); grid.appendChild(card); cardElements.push(card);
            }); setTimeout(() => { if(isGameActive) startContinuousShuffle(); }, 800);
        }
        function startContinuousShuffle() {
            let shuffleCount = 0; const maxShuffles = 5; const shuffleDuration = 600; const grid = document.getElementById('grid');
            function performShuffleStep() {
                if (!isGameActive) return; const firstRects = new Map(); cardElements.forEach(card => firstRects.set(card, card.getBoundingClientRect()));
                for (let i = cardElements.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [cardElements[i], cardElements[j]] = [cardElements[j], cardElements[i]]; }
                cardElements.forEach(card => grid.appendChild(card));
                cardElements.forEach(card => { const first = firstRects.get(card); const last = card.getBoundingClientRect(); card.style.transition = 'none'; card.style.transform = `translate(${first.left - last.left}px, ${first.top - last.top}px)`; card.style.zIndex = Math.floor(Math.random() * 10) + 2; });
                void grid.offsetWidth;
                cardElements.forEach(card => { card.style.transition = `transform ${shuffleDuration}ms ease-in-out`; card.style.transform = 'translate(0, 0)'; });
                shuffleCount++;

        const towerCanvas = document.getElementById('towerCanvas'); const tCtx = towerCanvas.getContext('2d');

            if (!isSlice) { ctx.fillStyle = "#1b321a"; ctx.fillRect(bx, by + bh/2 - 5, bw, 10); ctx.fillStyle = "#f28500"; if (bw > 10) ctx.fillRect(bx + bw/2 - 3, by + bh/2 - 3, 6, 6); }

        function drawTowerGame() {

        function drawSpinWheel() {

        }

        function spinLoop() {
            if (!isGameActive || currentGameMode !== 'spin') return;
            
            spinAngle += spinSpeed;
            spinSpeed *= 0.992; 

            const arc = Math.PI * 2 / wheelItems.length;
            let offsetAngle = spinAngle - (Math.PI / 2);
            if (offsetAngle < 0) offsetAngle = (Math.PI * 2) - (Math.abs(offsetAngle) % (Math.PI * 2));
            let currentTick = Math.floor(offsetAngle / arc);
            
            if (currentTick !== lastTickAngle && spinSpeed > 0.001) {
                playSynthesizedTick();
                lastTickAngle = currentTick;
            }

            drawSpinWheel();

            if (spinSpeed < 0.001) {
                isSpinning = false;
                spinSpeed = 0;
                let degrees = spinAngle * 180 / Math.PI + 90;
                let arcd = arc * 180 / Math.PI;
                let index = Math.floor((360 - degrees % 360) / arcd) % wheelItems.length;
                setTimeout(() => { evaluateSpinResult(wheelItems[index]); }, 500); 
            } else {
                requestAnimationFrame(spinLoop);
            }
        }

        function evaluateSpinResult(result) {
            if (result === "💀") { endGame(false, "KIESTÉL<br>Próbáld újra!"); } else { endGame(true, `A nyertes:<br>${result}`); }
        }
